<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton DSS - Chọn Vợt Đẹp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Nunito:wght@600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* --- ĐỊNH DẠNG CHUNG & NỀN PASTEL OMBRE TRƠN --- */
        body {
            font-family: 'Comfortaa', 'Nunito', sans-serif;
            background: linear-gradient(180deg, #fff1f2 0%, #ffe4e6 25%, #f3e8ff 70%, #fae8ff 100%) !important;
            min-height: 100vh;
            color: #374151;
            background-attachment: fixed;
        }

        /* --- CẤU TRÚC NAVBAR --- */
        .navbar {
            background: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }
        .navbar-brand {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: #f83191 !important; 
        }

        /* --- TIÊU ĐỀ CHỮ & TIÊU ĐỀ LỚN --- */
        .main-title-ombre {
            font-family: 'Quicksand', 'Nunito', sans-serif !important;
            text-align: center;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #e84393 !important; 
            background: none !important;
            -webkit-background-clip: initial !important;
            -webkit-text-fill-color: initial !important;
        }

        h2, h3, h4, h5 {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: #e84393 !important;
        }

        /* --- LÀM TRẮNG TINH CÁC KHỐI NỀN BÊN TRONG --- */
        .card, .glass-card, .bg-white {
            background: #ffffff !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border-radius: 20px !important;
            border: 1px solid rgba(244, 53, 141, 0.15) !important;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04) !important;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(244, 53, 141, 0.12) !important;
        }

        /* --- ĐÈ LẠI HÌNH THỨC Ô NHẬP LIỆU BOOTSTRAP --- */
        select.form-select, .form-select-lg, input.form-control {
            border: 2px solid #fcc1c9 !important; 
            border-radius: 12px !important;      
            box-shadow: none !important;          
            color: #4a4a4a !important;            
        }
        select.form-select:focus, input.form-control:focus {
            border-color: #f83191 !important;     
        }

        /* --- THÔNG TIN CHI TIẾT TRONG CARD VỢT --- */
        .card .text-muted, .card p.card-text:first-of-type {
            color: #0f0f0f !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            font-size: 14px !important;
            letter-spacing: 0.8px;
            display: inline-block;
            margin-bottom: 5px;
        }
        .card-title, h5.card-title {
            color: #2d3436 !important;
            font-weight: 800 !important;
            margin-top: 2px;
        }

        /* --- HỆ THỐNG MÀU BADGE (NỀN PASTEL, CHỮ ĐEN RÕ NÉT) --- */
        .bg-warning {
            --bs-bg-opacity: 1;
            background-color: rgb(241 178 203 / 22%) !important;
            color: #000000 !important;
            font-weight: 700 !important;
        }

        .bg-primary {
            --bs-bg-opacity: 1;
            background-color: rgb(248 169 237 / 24%) !important;
            color: #000000 !important;
            font-weight: 700 !important;
        }
        .bg-primary * {
            color: #000000 !important;
        }

        /* NHÃN XEM KỸ HƠN: NỀN HỒNG TÍM CHỮ ĐEN */
        .bg-secondary {
            --bs-bg-opacity: 1;
            background-color: rgb(248 169 237 / 45%) !important;
            color: #000000 !important;
            font-weight: 700 !important;
            border: 1px solid rgba(244, 53, 141, 0.15) !important;
        }
        .bg-secondary * {
            color: #000000 !important;
        }

        /* --- NÚT PASTEL --- */
        .btn-pastel {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            background: linear-gradient(135deg, #fcf4f980 0%, #edd0f473 100%);
            color: #f3559d;
            border: 1.5px solid #f4358d33;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .btn-pastel:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.3);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-pastel shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="/">
                🏸 BADMINTON DSS
            </a>
            <span class="navbar-text text-muted d-none d-md-inline fw-semibold">
                CHỌN ĐÚNG VỢT - NÂNG TẦM SMASH.
            </span>
        </div>
    </nav>

    <div class="container my-5">
        {% block content %} {% endblock %}
    </div>

    <footer class="text-center py-4 mt-5">
        <p class="mb-0">🏸 Hệ Thống Hỗ Trợ Ra Quyết Định Chọn Vợt Cầu Lông - Kiến tạo cú đập hoàn hảo</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
